services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    command: >
      /usr/local/bin/etcd 
      --listen-client-urls http://0.0.0.0:2379 
      --advertise-client-urls http://etcd:2379 
      --data-dir /etcd-data
    volumes:
      - ./vt/etcd:/etcd-data:Z

  init_topo:
    image: vitess/lite:latest
    restart: on-failure
    command: >
      sh -c "/vt/bin/vtctl
      --topo-implementation etcd2
      --topo-global-server-address etcd:2379
      --topo-global-root /vitess/global
      AddCellInfo
      --root /vitess/zone1
      --server_address etcd:2379
      zone1 || true"
    depends_on:
      - etcd

  vtctld:
    image: vitess/lite:latest
    restart: on-failure
    command: >
      /vt/bin/vtctld
      --topo-implementation etcd2
      --topo-global-server-address etcd:2379
      --topo-global-root /vitess/global
      --port 15000
      --grpc-port 15999
      --service-map 'grpc-vtctld'
    volumes: 
      - ./:/vt/files:Z
    ports:
      - "16000:15000"
      - "16999:15999"
    depends_on:
      - init_topo
  
  vtgate:
    image: vitess/lite:latest
    restart: on-failure
    command: >
      /vt/bin/vtgate
      --topo-implementation etcd2 
      --topo-global-server-address etcd:2379 
      --topo-global-root /vitess/global 
      --port 15001 
      --mysql-server-port 15306 
      --mysql_auth_server_impl none
      --cell zone1
      --cells-to-watch zone1
      --tablet-types-to-wait primary
    ports:
      - "16306:15306"
    depends_on:
      - init_topo

  auto_init_vitess:
    image: vitess/lite:latest
    volumes:
      - ./:/vt/files:Z
    command: >
      sh -c "tr -d '\\r' < /vt/files/init_vitess.sh > /tmp/init_vitess.sh &&
      chmod +x /tmp/init_vitess.sh &&
      /tmp/init_vitess.sh"
    depends_on:
      - vtctld
      - vttablet_core
      - vttablet_details

  # --- KEYSPACE: software_core ---
  mysql_core:
    image: mysql:8.0
    restart: always
    command: >
      mysqld
      --server-id=1
      --log-bin=mysql-bin
      --binlog_format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=software_core
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ./vt/core_shard_0:/var/lib/mysql:Z

  vttablet_core:
    image: vitess/lite:latest
    restart: on-failure
    command: >
      /vt/bin/vttablet 
      --tablet-path zone1-0000000101
      --init-tablet-type replica
      --init-keyspace software_core 
      --init-shard 0 
      --topo-implementation etcd2 
      --topo-global-server-address etcd:2379
      --topo-global-root /vitess/global
      --db-host mysql_core
      --db-port 3306
      --db-app-user root
      --db-app-password root
      --db-dba-user root
      --db-dba-password root
      --db-allprivs-user root
      --db-allprivs-password root
      --unmanaged
      --port 15002      
      --grpc-port 15992
      --service-map 'grpc-queryservice,grpc-tabletmanager'
    depends_on:
      mysql_core:
        condition: service_healthy
      init_topo:
        condition: service_started

  # --- KEYSPACE: software_details ---
  mysql_details:
    image: mysql:8.0
    restart: always
    command: >
      mysqld
      --server-id=2
      --log-bin=mysql-bin
      --binlog_format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=software_details
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ./vt/details_shard_0:/var/lib/mysql:Z

  vttablet_details:
    image: vitess/lite:latest
    restart: on-failure
    command: >
      /vt/bin/vttablet
      --tablet-path zone1-0000000102
      --init-tablet-type replica
      --init-keyspace software_details 
      --init-shard 0
      --topo-implementation etcd2 
      --topo-global-server-address etcd:2379
      --topo-global-root /vitess/global
      --db-host mysql_details
      --db-port 3306
      --db-app-user root
      --db-app-password root
      --db-dba-user root
      --db-dba-password root
      --db-allprivs-user root
      --db-allprivs-password root
      --unmanaged
      --port 15003 
      --grpc-port 15993
      --service-map 'grpc-queryservice,grpc-tabletmanager'
    depends_on:
      mysql_details:
        condition: service_healthy
      init_topo:
        condition: service_started